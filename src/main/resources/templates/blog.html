<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Blogs</title>
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/blog.css}">
</head>
<body>
    <!-- Reuse the Header Fragment on EVERY page -->
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="list-container">
        <h1 th:text="${blog.title}" class="page-title">Blog Name Here</h1>
        <button th:if="${#bools.isTrue(isOwner)}" class="add-btn" id="add-post-btn">
            Create A Post
        </button>

        <p th:if="${#lists.isEmpty(posts)}">No posts were found.</p>

        <div th:unless="${#lists.isEmpty(posts)}" class="blog-stack">
            <div th:each="post : ${posts}" class="blog-card-large">
                <div class="card-dates">
                    <span th:if="${post.createdAt != null}"
                          th:text="'Created: ' + ${#temporals.format(post.createdAt, 'MMM dd, yyyy')}">Jan 01, 2024</span>
                </div>
                <div th:text="${post.getTitle()}" class="card-title"></div>
                <div class="card-footer">
                    <div class="card-links">
                    </div>
                    <a th:href="@{/blog/post/{id}(id=${post.id})}" class="btn btn-primary">View Post</a>
                </div>
            </div>
        </div>


        <!-- Create Post Modal -->
        <div th:if="${isOwner}" id="post-modal" class="modal">
            <input type="hidden" id="blog-id" th:value="${blogId}">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Create Your Post</h2>
                </div>
                <form id="post-form">
                    <div class="form-group">
                        <label for="post-title">Post Title</label>
                        <input type="text" id="post-title" placeholder="My epic blog" required>
                    </div>
                    <div class="form-group">
                        <label for="post-content">Post Content</label>
                        <input type="text" id="post-content" placeholder="I did something cool" required>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-outline close-modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Create Post</button>
                    </div>
                </form>
            </div>
        </div>

    </div>

<script th:src="@{/js/post.js}"></script>
</body>
</html>
