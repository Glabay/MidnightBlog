<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/blog.css}">
</head>
<body>
    <!-- Reuse the Header Fragment on EVERY page -->
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="list-container">
        <h1 class="page-title">Blogs
            <button th:if="${!hasBlog}" class="add-btn" id="add-blog-btn">
                Create Blog
            </button>
        </h1>
        <p class="page-subtitle">Read thoughts and tutorials from the Midnight Coder community.</p>

        <p th:if="${#lists.isEmpty(blogs)}">No blogs found.</p>

        <div th:unless="${#lists.isEmpty(blogs)}" class="blog-stack">
            <div th:each="blog : ${blogs}" class="blog-card-large">
                <div th:text="${blog.getAuthor().getUsername()} + '\'s Blog'" class="card-author"></div>
                <div class="card-dates">
                    <span th:if="${blog.createdAt != null}"
                          th:text="'Created: ' + ${#temporals.format(blog.createdAt, 'MMM dd, yyyy')}">Jan 01, 2024</span>

                    <span class="member-count"
                          th:text="' | ' + ${#lists.size(blog.getPosts())} + ' Posts'"> | 0 Posts</span>
                </div>
                <div th:text="${blog.getTitle()}" class="card-title"></div>

                <div class="card-footer">
                    <div class="card-links">
                    </div>
                    <a th:href="@{/blog/{id}(id=${blog.id})}" class="btn btn-primary">View Blog</a>
                </div>
            </div>
        </div>

        <!-- Create Blog Modal -->
        <div th:if="${!hasBlog}" id="blog-modal" class="modal">
            <input type="hidden" id="user-id" th:value="${userId}">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Create Your Blog</h2>
                </div>
                <form id="blog-form">
                    <div class="form-group">
                        <label for="blog-name">Blog Title</label>
                        <input type="text" id="blog-name" placeholder="My epic blog" required>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-outline close-modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Create Blog</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

<script th:src="@{/js/blog.js}"></script>
</body>
</html>
