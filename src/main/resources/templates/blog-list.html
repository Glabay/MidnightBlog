<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link rel="stylesheet" th:href="@{/css/header.css}">
</head>
<body>
    <!-- Reuse the Header Fragment on EVERY page -->
    <div th:replace="~{fragments/header :: header}"></div>

    <!-- TODO: Add Button to create new blog -->

    <h1>Blogs</h1>
    <p th:if="${#lists.isEmpty(blogs)}">No blogs found.</p>

    <div th:unless="${#lists.isEmpty(blogs)}">
        <div th:each="blog : ${blogs}">
            <h2 th:text="${blog.title}"></h2>
            <p th:text="${blog.getAuthor().getUsername()}"></p>
        </div>
    </div>
</body>
</html>
